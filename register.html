<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Student Union</title>
    <base href="/" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="container">
      <!-- ACTUAL HEADER - Copy this from your profile.html -->
      <header>
        <div class="brown-line"></div>
        <div class="logo-line">
          <div class="logos">
            <img class="big-logo" src="/image/logo.png" alt="big_logo" />
            <div class="vertical-line"></div>
            <img
              class="small-logo"
              src="/image/logo-small.png"
              alt="small_logo"
            />
          </div>
          <a class="logo-line-link" href=""
            >STUDENT UNION NAZARBAYEV UNIVERSITY</a
          >
          <img class="nu-img" src="/image/nu.png" alt="nu_img" />
          <div class="log-column">
            <button class="log-out">Log Out</button>
            <button id="profileButton" class="profile-button">Name ⌄</button>
          </div>
        </div>
        <div class="oyu"></div>
        <nav class="navbar">
          <p>MENU</p>
        </nav>
      </header>

      <main>
        <h1>Student Registration</h1>

        <form id="registerForm" class="register-form">
          <!-- Name -->
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />
          </div>

          <!-- Surname -->
          <div class="form-group">
            <label for="surname">Surname:</label>
            <input type="text" id="surname" name="surname" required />
          </div>

          <!-- ID -->
          <div class="form-group">
            <label for="studentId">Student ID:</label>
            <input type="text" id="studentId" name="studentId" required />
          </div>

          <!-- Photo Upload -->
          <div class="form-group">
            <label for="photo">Photo:</label>
            <input
              type="file"
              id="photo"
              name="photo"
              accept="image/*"
              required
            />
            <div class="photo-preview" id="photoPreview"></div>
          </div>

          <button type="submit" class="btn-submit">Register</button>
        </form>
      </main>

      <!-- ACTUAL FOOTER - Copy this from your profile.html -->
      <footer>
        <div class="footer-description">
          <div class="footer-gray-container">
            <p>NAZARBAYEV UNIVERSITY</p>
            <p>Department of Student Services</p>
          </div>
          <img class="footer-nu-img" src="/image/footer-img.png" alt="nu-img" />
          <div class="footer-gray-container">
            <p>53 Kabanbay Batyr Ave, Nur-Sultan city,</p>
            <p>Republic of Kazakhstan, 010000</p>
            <p>Nazarbayev University</p>
          </div>
        </div>
        <div class="brown-line"></div>
      </footer>
    </div>

    <script src="/register.js"></script>
  </body>
</html>
